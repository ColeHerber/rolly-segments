[env:esp32-s3-wroom-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*

; ESP32-S3-WROOM-1-N8 has 8 MB flash.
board_upload.flash_size = 8MB
board_build.flash_mode = dio

; Use the ESP32-S3 native USB CDC serial port for bring-up logs.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; CAN: 0 = no-ack (solo debug, no bus needed); 1 = normal (requires another node to ACK)
    -D CAN_REQUIRE_ACK=0

lib_deps =
    mathieucarbou/ESPAsyncWebServer@^3.3.23
    bblanchon/ArduinoJson@^7.3.1

[env:esp32-s3-wroom-1-uart-115200]
extends = env:esp32-s3-wroom-1
upload_speed = 115200

[env:esp32-s3-wroom-1-ota]
extends = env:esp32-s3-wroom-1
upload_protocol = espota
upload_port = 172.20.10.3
upload_flags = --auth=password

[env:esp32-s3-wroom-1-imu-spi-debug]
extends = env:esp32-s3-wroom-1
build_flags =
    ${env:esp32-s3-wroom-1.build_flags}
    -D IMU_SPI_DEBUG=1
    -D IMU_SPI_CS_LOW_HOLD_MS=15000

[env:esp32-s3-wroom-1-ota-imu-spi-debug]
extends = env:esp32-s3-wroom-1-ota
build_flags =
    ${env:esp32-s3-wroom-1.build_flags}
    -D IMU_SPI_DEBUG=1
    -D IMU_SPI_CS_LOW_HOLD_MS=15000

[env:esp32-s3-wroom-1-imu-spi-scope]
extends = env:esp32-s3-wroom-1-imu-spi-debug
build_flags =
    ${env:esp32-s3-wroom-1.build_flags}
    -D IMU_SPI_DEBUG=1
    -D IMU_SPI_CS_LOW_HOLD_MS=15000
    -D IMU_SPI_SCOPE_LOOP=1
    -D IMU_SPI_SCOPE_LOOP_COUNT=300

[env:esp32-s3-wroom-1-ota-imu-spi-scope]
extends = env:esp32-s3-wroom-1-ota
build_flags =
    ${env:esp32-s3-wroom-1.build_flags}
    -D IMU_SPI_DEBUG=1
    -D IMU_SPI_CS_LOW_HOLD_MS=15000
    -D IMU_SPI_SCOPE_LOOP=1
    -D IMU_SPI_SCOPE_LOOP_COUNT=300
